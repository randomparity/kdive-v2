schema_version: 1
provider: local-libvirt
storage:
  allowed_component_roots:
    - /var/lib/kdive/rootfs
  cache_dir: /var/lib/kdive/rootfs/cache
  overlay_dir: /var/lib/kdive/rootfs/overlays
# The rootfs catalog moved to the DB-backed image_catalog (ADR-0092); the baseline rootfs
# metadata now ships in src/kdive/images/seed_data/ and is seeded as `defined` rows. Only the
# profiles half stays file-based — load_fixture_catalog still resolves it.
rootfs: []
profiles:
  - profiles/console-ready_x86_64.yaml
