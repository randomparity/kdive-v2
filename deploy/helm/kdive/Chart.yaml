apiVersion: v2
name: kdive
description: kdive control plane (server/worker/reconciler)
type: application
version: 0.1.0
appVersion: "0.3.0"
# Bitnami stopped publishing charts to charts.bitnami.com in 2025; the charts now
# ship only as OCI artifacts under oci://registry-1.docker.io/bitnamicharts. These
# pins are reached only on the off-by-default, demo-only `bundledBackends` path.
dependencies:
  - name: postgresql
    version: 16.7.27
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: bundledBackends
  - name: minio
    version: 17.0.21
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: bundledBackends
