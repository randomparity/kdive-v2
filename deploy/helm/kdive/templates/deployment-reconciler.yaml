apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kdive.fullname" . }}-reconciler
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.reconciler.replicas }}
  selector:
    matchLabels:
      app: {{ include "kdive.fullname" . }}-reconciler
  template:
    metadata:
      labels:
        app: {{ include "kdive.fullname" . }}-reconciler
        {{- include "kdive.labels" . | nindent 8 }}
      annotations:
        {{- include "kdive.scrapeAnnotations" 9466 | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: reconciler
          image: {{ include "kdive.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["reconciler"]
          env:
            {{- include "kdive.auxEnv" 9466 | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "kdive.fullname" . }}-config
          # No Service fronts the reconciler; its aux listener (ADR-0090 §5) is reached
          # only by the pod-local kubelet/scrape. /readyz gates rollout progression (it
          # withdraws nothing), /livez tracks the reconcile loop — a not-ready reconciler
          # is not killed by liveness.
          ports:
            - containerPort: 9466
          {{- include "kdive.auxProbes" 9466 | nindent 10 }}
