apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kdive.fullname" . }}-build
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.worker.persistence.build.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "kdive.fullname" . }}-install
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.worker.persistence.install.size }}
