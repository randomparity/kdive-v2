{{- if .Values.bundledBackends }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kdive.fullname" . }}-oidc
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "kdive.fullname" . }}-oidc
  template:
    metadata:
      labels:
        app: {{ include "kdive.fullname" . }}-oidc
        {{- include "kdive.labels" . | nindent 8 }}
    spec:
      containers:
        - name: oidc
          image: {{ .Values.demo.oidc.image }}
          env:
            - name: SERVER_PORT
              value: "8080"
            # Mint the demo claim set on every token from the `default` issuer. The claims
            # come from .Values.demo.oidc.claims (default: a full RBAC grant on project
            # `demo`, so a stock demo deploy is RBAC-testable — ADR-0108). `sub` and `aud`
            # are template invariants layered over any override: `aud` stays ["kdive"]
            # (config KDIVE_OIDC_AUDIENCE) so an override can never break audience
            # verification and lock the demo out; `sub` defaults to kdive-demo. A blanked
            # override (claims=null/empty) degrades to the safe {sub,aud} floor, not an error.
            {{- $demoClaims := .Values.demo.oidc.claims | default dict }}
            {{- $sub := default "kdive-demo" $demoClaims.sub }}
            {{- $adminClaims := merge (dict "sub" $sub "aud" (list "kdive")) (omit $demoClaims "aud" "sub") }}
            {{- /* Role-scoped variants for demonstrating RBAC denials (ADR-0108 §4). A token
                   request with client_id `kdive-demo-<role>` mints a token holding only that
                   PROJECT role on the demo's projects and NO platform roles, so a
                   require_role/require_platform_role denial is a one-flag mint
                   (`scripts/demo-token.sh --role <role>`) instead of a chart redeploy. These
                   mappings come first; mock-oauth2-server is first-match-wins, so the default
                   client_id `kdive-demo` falls through to the catch-all full-admin grant
                   below (unchanged behavior). Variants are emitted only when membership
                   exists — a blanked `claims` override degrades to the {sub,aud} floor with
                   no variants (a project role is meaningless without a project). */ -}}
            {{- $projects := default (list) $demoClaims.projects }}
            {{- $mappings := list }}
            {{- if $projects }}
            {{- range $role := (list "viewer" "operator") }}
            {{- $roleMap := dict }}
            {{- range $proj := $projects }}{{- $_ := set $roleMap $proj $role }}{{- end }}
            {{- $variant := dict "sub" (printf "%s-%s" $sub $role) "aud" (list "kdive") "projects" $projects "roles" $roleMap }}
            {{- $mappings = append $mappings (dict "requestParam" "client_id" "match" (printf "kdive-demo-%s" $role) "claims" $variant) }}
            {{- end }}
            {{- end }}
            {{- $mappings = append $mappings (dict "requestParam" "grant_type" "match" "*" "claims" $adminClaims) }}
            - name: JSON_CONFIG
              value: '{"interactiveLogin":false,"tokenCallbacks":[{"issuerId":"default","requestMappings":{{ $mappings | toJson }}}]}'
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /default/.well-known/openid-configuration
              port: 8080
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kdive.fullname" . }}-oidc
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "kdive.fullname" . }}-oidc
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
