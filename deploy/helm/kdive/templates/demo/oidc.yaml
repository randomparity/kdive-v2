{{- if .Values.bundledBackends }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kdive.fullname" . }}-oidc
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "kdive.fullname" . }}-oidc
  template:
    metadata:
      labels:
        app: {{ include "kdive.fullname" . }}-oidc
        {{- include "kdive.labels" . | nindent 8 }}
    spec:
      containers:
        - name: oidc
          image: {{ .Values.demo.oidc.image }}
          env:
            - name: SERVER_PORT
              value: "8080"
            # Mint the demo claim set on every token from the `default` issuer. The claims
            # come from .Values.demo.oidc.claims (default: a full RBAC grant on project
            # `demo`, so a stock demo deploy is RBAC-testable — ADR-0105). `sub` and `aud`
            # are template invariants layered over any override: `aud` stays ["kdive"]
            # (config KDIVE_OIDC_AUDIENCE) so an override can never break audience
            # verification and lock the demo out; `sub` defaults to kdive-demo.
            {{- $claims := merge (dict "sub" (default "kdive-demo" .Values.demo.oidc.claims.sub) "aud" (list "kdive")) (omit .Values.demo.oidc.claims "aud" "sub") }}
            - name: JSON_CONFIG
              value: '{"interactiveLogin":false,"tokenCallbacks":[{"issuerId":"default","requestMappings":[{"requestParam":"grant_type","match":"*","claims":{{ $claims | toJson }}}]}]}'
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /default/.well-known/openid-configuration
              port: 8080
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kdive.fullname" . }}-oidc
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "kdive.fullname" . }}-oidc
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
