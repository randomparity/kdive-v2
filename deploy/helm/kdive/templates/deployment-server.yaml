apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kdive.fullname" . }}-server
  labels:
    {{- include "kdive.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app: {{ include "kdive.fullname" . }}-server
  template:
    metadata:
      labels:
        app: {{ include "kdive.fullname" . }}-server
        {{- include "kdive.labels" . | nindent 8 }}
      annotations:
        {{- include "kdive.scrapeAnnotations" 9464 | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        # fsGroup so the non-root UID can read a mounted file-ref Secret via its group bit.
        fsGroup: 10001
      containers:
        - name: server
          image: {{ include "kdive.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server"]
          env:
            - name: KDIVE_HTTP_HOST
              value: "0.0.0.0"
            {{- include "kdive.auxEnv" 9464 | nindent 12 }}
            {{- include "kdive.secretsEnv" . | nindent 12 }}
            {{- include "kdive.systemsEnv" . | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "kdive.fullname" . }}-config
          ports:
            - containerPort: 8000
            - containerPort: 9464
          {{- include "kdive.auxProbes" 9464 | nindent 10 }}
          {{- if or .Values.secrets.secretName .Values.systems.configMapName }}
          volumeMounts:
            {{- include "kdive.secretsVolumeMount" . | nindent 12 }}
            {{- include "kdive.systemsVolumeMount" . | nindent 12 }}
          {{- end }}
      {{- if or .Values.secrets.secretName .Values.systems.configMapName }}
      volumes:
        {{- include "kdive.secretsVolume" . | nindent 8 }}
        {{- include "kdive.systemsVolume" . | nindent 8 }}
      {{- end }}
