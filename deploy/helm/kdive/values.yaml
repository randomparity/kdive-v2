image:
  repository: ghcr.io/randomparity/kdive
  tag: ""            # defaults to .Chart.AppVersion
  digest: ""         # set to pin by digest (overrides tag)
  pullPolicy: IfNotPresent

# bundledBackends pulls the Postgres/MinIO subcharts for a turnkey demo. They run
# on emptyDir (no PVC, no backup): a pod restart drops all state by design. It is
# ephemeral/demo-only and must be co-set with demoAcknowledged=true or the chart
# fails to render. Production runs against operator-provided backends, toggle off.
bundledBackends: false
demoAcknowledged: false

config:
  KDIVE_DATABASE_URL: ""
  KDIVE_OIDC_ISSUER: ""
  KDIVE_OIDC_JWKS_URI: ""
  KDIVE_OIDC_AUDIENCE: kdive
  KDIVE_S3_ENDPOINT_URL: ""
  KDIVE_S3_BUCKET: kdive-artifacts
  KDIVE_S3_REGION: us-east-1

# Optional declarative inventory (systems.toml, ADR-0112). Create a ConfigMap with a
# `systems.toml` key and set configMapName to mount it on migrate/server/worker/reconciler.
# Remote-libvirt connection identity (uri, TLS refs, gdb address/range, base_image) lives in
# this file; config.* only carries remaining process env such as storage pool/network/machine.
systems:
  configMapName: ""
  mountPath: /etc/kdive/systems
  fileName: systems.toml

# Project a pre-existing Kubernetes Secret as files under mountPath on the components that
# resolve secret references by file (server, worker, reconciler — the worker/reconciler open
# the remote-libvirt qemu+tls transport; the server resolves debug-session secrets). Leave
# secretName empty to mount nothing. Each Secret key becomes a file; reference it with a
# root-relative ref, e.g. clientcert.pem in systems.toml. When secretName
# is set the chart mounts the Secret read-only and sets KDIVE_SECRETS_ROOT to mountPath so the
# refs resolve under it (the config.* ConfigMap is for non-secret values only — ADR-0088 §3).
secrets:
  secretName: ""
  mountPath: /etc/kdive/secrets

# The server's MCP Service (port 8000). Default ClusterIP keeps MCP in-cluster (reach it with
# `kubectl port-forward`); set type: NodePort (optionally pinning nodePort) or front it with an
# Ingress/LoadBalancer to expose it. The per-process aux ports are never fronted by a Service.
service:
  type: ClusterIP
  nodePort: null   # only honored when type is NodePort; null lets the cluster assign one

server:
  replicas: 1

reconciler:
  replicas: 1

worker:
  replicas: 1
  persistence:
    build:
      size: 10Gi
    install:
      size: 5Gi

# Fixed credentials for the demo-only bundledBackends path. They are non-secret by
# design (the data is ephemeral emptyDir state) and let the chart derive a working
# KDIVE_DATABASE_URL / KDIVE_S3_* without operator input. Override for the demo if
# desired; they are never used on the external-backend path.
demoCredentials:
  postgresql:
    username: kdive
    password: kdive-demo # pragma: allowlist secret
    database: kdive
  minio:
    rootUser: kdive
    rootPassword: kdive-demo-secret # pragma: allowlist secret

# Image pins for the first-party demo backends (bundledBackends path only).
demo:
  postgres:
    image: postgres:17
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    # Expose the bundled object store off-cluster (needed for remote-libvirt guest
    # install/capture and external build uploads — see the deploy README, "Single object
    # store"). Default ClusterIP keeps it in-cluster; with NodePort also set a node-routable
    # config.KDIVE_S3_ENDPOINT_URL so presigned URLs carry an address every party reaches.
    service:
      type: ClusterIP
      nodePort: ""
      # When exposed (type != ClusterIP), the demo default-deny NetworkPolicy is opened for the
      # MinIO S3 port from these CIDRs so the remote guest/uploader can reach it. Empty = anywhere
      # (0.0.0.0/0, demo only); scope to your client/guest networks in anything less throwaway.
      # NOTES.txt prints a loud warning whenever the effective range stays world-open.
      sourceRanges: []
  mc:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
  oidc:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.3
    # Demo-only claim set the bundled issuer stamps on every token. The issuer mints a
    # valid kdive token for ANY caller, so this is the grant every such token carries.
    # The default grants full RBAC over the seeded `demo` project (admin) plus all three
    # platform roles so a stock demo deploy can exercise the entire RBAC/authz surface.
    # NEVER front a real RBAC boundary with this issuer. `aud` is pinned to ["kdive"] by
    # the template and cannot be overridden here. To test a denial per session, mint a
    # narrowed token with `scripts/demo-token.sh --role viewer|operator` (the template also
    # registers `client_id: kdive-demo-<role>` variants — project role only, no platform
    # roles); to change the *default* grant deploy-wide use `--set demo.oidc.claims.roles.demo=
    # viewer`. If you change the project name, run `kdive seed-demo --project <name>` so it
    # has a budget/quota row.
    claims:
      sub: kdive-demo
      projects: ["demo"]
      roles:
        demo: admin
      platform_roles: ["platform_admin", "platform_operator", "platform_auditor"]
