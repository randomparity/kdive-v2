image:
  repository: ghcr.io/randomparity/kdive
  tag: ""            # defaults to .Chart.AppVersion
  digest: ""         # set to pin by digest (overrides tag)
  pullPolicy: IfNotPresent

# bundledBackends pulls the Postgres/MinIO subcharts for a turnkey demo. They run
# on emptyDir (no PVC, no backup): a pod restart drops all state by design. It is
# ephemeral/demo-only and must be co-set with demoAcknowledged=true or the chart
# fails to render. Production runs against operator-provided backends, toggle off.
bundledBackends: false
demoAcknowledged: false

config:
  KDIVE_DATABASE_URL: ""
  KDIVE_OIDC_ISSUER: ""
  KDIVE_OIDC_JWKS_URI: ""
  KDIVE_OIDC_AUDIENCE: kdive
  KDIVE_S3_ENDPOINT_URL: ""
  KDIVE_S3_BUCKET: kdive-artifacts
  KDIVE_S3_REGION: us-east-1

# Project a pre-existing Kubernetes Secret as files under mountPath on the components that
# resolve secret references by file (server, worker, reconciler — the worker/reconciler open
# the remote-libvirt qemu+tls transport; the server resolves debug-session secrets). Leave
# secretName empty to mount nothing. Each Secret key becomes a file; reference it with a
# root-relative ref, e.g. KDIVE_REMOTE_LIBVIRT_CLIENT_CERT_REF=clientcert.pem. When secretName
# is set the chart mounts the Secret read-only and sets KDIVE_SECRETS_ROOT to mountPath so the
# refs resolve under it (the config.* ConfigMap is for non-secret values only — ADR-0088 §3).
secrets:
  secretName: ""
  mountPath: /etc/kdive/secrets

# The server's MCP Service (port 8000). Default ClusterIP keeps MCP in-cluster (reach it with
# `kubectl port-forward`); set type: NodePort (optionally pinning nodePort) or front it with an
# Ingress/LoadBalancer to expose it. The per-process aux ports are never fronted by a Service.
service:
  type: ClusterIP
  nodePort: null   # only honored when type is NodePort; null lets the cluster assign one

server:
  replicas: 1

reconciler:
  replicas: 1

worker:
  replicas: 1
  persistence:
    build:
      size: 10Gi
    install:
      size: 5Gi

# Fixed credentials for the demo-only bundledBackends path. They are non-secret by
# design (the data is ephemeral emptyDir state) and let the chart derive a working
# KDIVE_DATABASE_URL / KDIVE_S3_* without operator input. Override for the demo if
# desired; they are never used on the external-backend path.
demoCredentials:
  postgresql:
    username: kdive
    password: kdive-demo # pragma: allowlist secret
    database: kdive
  minio:
    rootUser: kdive
    rootPassword: kdive-demo-secret # pragma: allowlist secret

# Subchart overrides for the demo-only bundledBackends path. Persistence is forced
# off so the system-of-record runs on emptyDir: a pod restart drops all state by
# design (ADR-0088 decision 7). Credentials match demoCredentials so the derived
# KDIVE_DATABASE_URL / KDIVE_S3_* connect. Reached only when bundledBackends=true.
postgresql:
  auth:
    username: kdive
    password: kdive-demo # pragma: allowlist secret
    database: kdive
  primary:
    persistence:
      enabled: false
minio:
  auth:
    rootUser: kdive
    rootPassword: kdive-demo-secret # pragma: allowlist secret
  defaultBuckets: kdive-artifacts
  persistence:
    enabled: false
  mode: standalone
