name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint · type · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install libvirt build headers
        # libvirt-python has no wheels; it compiles against the system libvirt
        # headers, so `uv sync` fails without libvirt-dev present.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvirt-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Lockfile up to date
        run: uv lock --check

      # The lint/type/test commands live only in the justfile; CI invokes the same
      # recipes a developer runs, so there is one source of truth (and `just type` is
      # whole-tree, the only place CI type-checks `tests/` — the pre-commit job skips ty).
      - name: Set up just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Build-info baking guard
        run: |
          # Exercise the release-path invocation (`just build true`) that release.yml
          # uses, so a regression in argument passing fails here, not at release time.
          just build true
          unzip -l dist/*.whl | grep -q 'kdive/_buildinfo.py' \
            || { echo "::error::_buildinfo.py not packaged in the wheel"; exit 1; }
          test ! -f src/kdive/_buildinfo.py \
            || { echo "::error::_buildinfo.py left in the tree after build"; exit 1; }

      - name: Lint
        run: just lint

      - name: Install shell linters (pinned)
        # lint-shell needs shfmt + shellcheck. shfmt is not on the runner; install a
        # pinned build via `go install` (Go is preinstalled; the module checksum DB
        # verifies integrity). The runner's system shellcheck is older than the version
        # the pre-commit hook and local dev use (0.11.0) and emits info-level findings
        # 0.11.0 dropped, so pin shellcheck too — the gate must enforce one standard.
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          sc_ver=v0.11.0
          sc_sha=8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
          curl -fsSL -o /tmp/shellcheck.tar.xz \
            "https://github.com/koalaman/shellcheck/releases/download/${sc_ver}/shellcheck-${sc_ver}.linux.x86_64.tar.xz"
          echo "${sc_sha}  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install "/tmp/shellcheck-${sc_ver}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Lint shell scripts
        run: just lint-shell

      - name: Type check
        run: just type

      - name: Doc links resolve
        # CI invokes recipes individually, so list this explicitly to gate PRs.
        run: just docs-links

      - name: Doc paths resolve
        run: just docs-paths

      - name: Docs reference up to date
        # The generated tool reference (docs/guide/reference/) must match a fresh
        # generation from the registry (ADR-0047). `just docs-check` diffs the committed
        # files against the generator. Local `just ci` runs this, but CI invokes recipes
        # individually (see note above), so it must be listed here to gate PRs.
        run: just docs-check

      - name: Config reference up to date
        # The generated config reference (docs/guide/reference/config.md) must match a
        # fresh generation from the registry (ADR-0087). Listed here because CI invokes
        # recipes individually, so adding it only to `just ci` would not gate PRs.
        run: just config-docs-check

      - name: Config env guard
        # No KDIVE_* env read may live outside kdive.config (ADR-0087). Listed here
        # because CI invokes recipes individually, so the ci recipe alone would not gate.
        run: just config-guard

      - name: Env documentation guard
        # Every KDIVE_* token in the tree must be documented (a registry Setting or an
        # external_env.py entry). Listed here because CI invokes recipes individually, so
        # adding it only to `just ci` would not gate PRs.
        run: just env-docs-check

      - name: Chart appVersion guard
        # Chart.yaml appVersion must equal the pyproject version (spec A3) so a cut
        # release publishes an image at exactly the chart's default tag. Listed here
        # because CI invokes recipes individually.
        run: just chart-version-check

      - name: Set up Helm
        # The tests/helm render gate skips when helm is absent (a skip validates
        # nothing), so CI installs helm to actually exercise the chart (ADR-0088 §7).
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.21.0

      - name: Test
        # KDIVE_REQUIRE_DOCKER turns the db suite's skip-when-no-Docker into a hard
        # failure, so a broken daemon on the runner can't mask the schema tests
        # (ADR-0015). GitHub-hosted ubuntu runners provide Docker.
        env:
          KDIVE_REQUIRE_DOCKER: "1"
        run: just test

  image-build:
    name: image build + smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (no push)
        # Exercises the Dockerfile on every PR (ADR-0088 decision 8). The build-time
        # tool-verification RUN fails the build if a worker tool is missing, so a broken
        # toolchain fails here, not at release time. load:true puts kdive:ci in the local
        # daemon so the smoke step can run it.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: kdive:ci

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Image smoke test
        # The job never runs `uv sync`, so kdive is not importable; --no-project keeps it
        # that way and --noconftest skips the root conftest (which imports kdive.config).
        # The smoke test needs no fixtures — only stdlib + pytest + `docker run`.
        run: >-
          uv run --no-project --with pytest
          pytest --noconftest tests/image/test_image_smoke.py -q
        env:
          KDIVE_IMAGE: kdive:ci

  live-vm:
    name: live_vm (self-hosted KVM)
    # Gated to manual dispatch: the live_vm suite needs a KVM/nested-virt host
    # with libvirt and a kdump-enabled guest image, which GitHub-hosted runners
    # do not provide. It never runs on pull_request, so PR CI stays green.
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, kvm]
    # Runner prerequisite: the self-hosted KVM host must provide the libvirt-dev
    # headers (not just the libvirt runtime), since `uv sync` builds
    # libvirt-python from source. This job does not apt-install them, because a
    # self-hosted runner is operator-provisioned and may lack passwordless sudo.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Test (live_vm)
        run: uv run python -m pytest -m live_vm -q

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Run hooks
        # The ty hook shells out to `uv run ty check`, which would sync the whole
        # project (and need libvirt-dev) just to type-check; the lint-type-test job
        # covers ty whole-tree (`ty check`, not `ty check src`), so skip it here and
        # keep this job venv-free.
        env:
          SKIP: ty
        run: uvx prek@0.4.3 run --all-files --show-diff-on-failure

  workflow-hygiene:
    name: workflow security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Scan workflows with zizmor
        run: uvx zizmor@1.25.2 .github/workflows

  supply-chain-runtime:
    name: supply chain (runtime)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Install libvirt build headers
        # pip-audit resolves the pinned set with pip, which builds libvirt-python
        # (sdist only) to read its metadata; that build needs the libvirt headers.
        # Without them, --strict fails rather than silently skipping the package.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvirt-dev

      - name: Audit runtime dependencies
        run: |
          uv export --no-emit-project --no-dev --no-default-groups \
            --format requirements-txt > runtime-reqs.txt
          uvx pip-audit@2.10.0 --no-deps --strict -r runtime-reqs.txt

  supply-chain-dev:
    name: supply chain (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Install libvirt build headers
        # Same reason as the runtime job: pip-audit builds libvirt-python to read
        # its metadata, so without the headers it would silently skip the package.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvirt-dev

      - name: Audit all dependencies (including dev)
        # Dev advisories do not ship to users, so this never fails the build — but
        # it surfaces findings in the job summary and as a warning annotation
        # rather than hiding them behind a green check.
        run: |
          uv export --no-emit-project --format requirements-txt > dev-reqs.txt
          if uvx pip-audit@2.10.0 --no-deps -r dev-reqs.txt > dev-audit.txt 2>&1; then
            echo "No known advisories in dev dependencies." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### pip-audit: dev-dependency advisories (informational)"
              echo '```'
              cat dev-audit.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::pip-audit found dev-dependency advisories (see job summary)"
          fi
