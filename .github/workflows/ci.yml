name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint · type · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install libvirt build headers
        # libvirt-python has no wheels; it compiles against the system libvirt
        # headers, so `uv sync` fails without libvirt-dev present.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libvirt-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check src

      - name: Test
        # KDIVE_REQUIRE_DOCKER turns the db suite's skip-when-no-Docker into a hard
        # failure, so a broken daemon on the runner can't mask the schema tests
        # (ADR-0015). GitHub-hosted ubuntu runners provide Docker.
        env:
          KDIVE_REQUIRE_DOCKER: "1"
        run: uv run python -m pytest -m "not live_vm" -q

  live-vm:
    name: live_vm (self-hosted KVM)
    # Gated to manual dispatch: the live_vm suite needs a KVM/nested-virt host
    # with libvirt and a kdump-enabled guest image, which GitHub-hosted runners
    # do not provide. It never runs on pull_request, so PR CI stays green.
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, kvm]
    # Runner prerequisite: the self-hosted KVM host must provide the libvirt-dev
    # headers (not just the libvirt runtime), since `uv sync` builds
    # libvirt-python from source. This job does not apt-install them, because a
    # self-hosted runner is operator-provisioned and may lack passwordless sudo.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Test (live_vm)
        run: uv run python -m pytest -m live_vm -q

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Run hooks
        # The ty hook shells out to `uv run ty check`, which would sync the whole
        # project (and need libvirt-dev) just to type-check; the lint-type-test
        # job already covers ty, so skip it here and keep this job venv-free.
        env:
          SKIP: ty
        run: uvx prek@0.4.3 run --all-files --show-diff-on-failure

  workflow-hygiene:
    name: workflow security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Scan workflows with zizmor
        run: uvx zizmor@1.25.2 .github/workflows

  supply-chain-runtime:
    name: supply chain (runtime)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Audit runtime dependencies
        # Reads the lockfile only (no build), so libvirt-dev is not needed.
        run: |
          uv export --no-emit-project --no-dev --no-default-groups \
            --format requirements-txt > runtime-reqs.txt
          uvx pip-audit@2.10.0 --strict -r runtime-reqs.txt

  supply-chain-dev:
    name: supply chain (dev)
    runs-on: ubuntu-latest
    # Dev-only advisories are informational: they do not ship to users, so a
    # finding here annotates the run without failing it.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.18"
          enable-cache: true

      - name: Audit all dependencies (including dev)
        run: |
          uv export --no-emit-project --format requirements-txt > dev-reqs.txt
          uvx pip-audit@2.10.0 -r dev-reqs.txt
