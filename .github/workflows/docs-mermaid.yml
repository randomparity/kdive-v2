name: docs-mermaid

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-mermaid-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mermaid:
    name: parse-check mermaid blocks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install checker dependencies
        working-directory: .github/scripts/mermaid-check
        run: npm ci --ignore-scripts

      - name: Test the checker
        working-directory: .github/scripts/mermaid-check
        run: npm test

      - name: Parse-check mermaid blocks in all Markdown
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.md')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Markdown files tracked; nothing to check."
            exit 0
          fi
          node .github/scripts/mermaid-check/mermaid-check.mjs "${files[@]}"
